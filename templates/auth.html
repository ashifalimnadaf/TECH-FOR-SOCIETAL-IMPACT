<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeVoice | Login & Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --secondary-gradient: linear-gradient(135deg, #2af598 0%, #009efd 100%);
            --bright-accent: #4f46e5;
            --soft-white: #f8fafc;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f1f5f9;
            background: linear-gradient(-45deg, #f1f5f9, #e2e8f0, #f8fafc, #f1f5f9);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            position: relative;
            width: 900px;
            max-width: 100%;
            height: 600px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.8);
            animation: containerEntrance 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes containerEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(50px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .form-container {
            position: absolute;
            top: 0;
            height: 100%;
            transition: all 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .login-container {
            left: 0;
            width: 50%;
            z-index: 2;
        }

        .signup-container {
            left: 0;
            width: 50%;
            opacity: 0;
            z-index: 1;
        }

        .container.active .login-container {
            transform: translateX(100%);
            opacity: 0;
        }

        .container.active .signup-container {
            transform: translateX(100%);
            opacity: 1;
            z-index: 5;
            animation: show 0.8s;
        }

        @keyframes show {
            0%, 49.99% { opacity: 0; z-index: 1; }
            50%, 100% { opacity: 1; z-index: 5; }
        }

        .overlay-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            overflow: hidden;
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            z-index: 100;
        }

        .container.active .overlay-container {
            transform: translateX(-100%);
        }

        .overlay {
            background: var(--primary-gradient);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: 0 0;
            color: #FFFFFF;
            position: relative;
            left: -100%;
            height: 100%;
            width: 200%;
            transform: translateX(0);
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .container.active .overlay {
            transform: translateX(50%);
        }

        .overlay-panel {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 50px;
            text-align: center;
            top: 0;
            height: 100%;
            width: 50%;
            transform: translateX(0);
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .overlay-left {
            transform: translateX(-20%);
        }

        .container.active .overlay-left {
            transform: translateX(0);
        }

        .overlay-right {
            right: 0;
            transform: translateX(0);
        }

        .container.active .overlay-right {
            transform: translateX(20%);
        }

        form {
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 20px;
            height: 100%;
            text-align: center;
        }

        h1 {
            font-weight: 900;
            margin: 0;
            color: #0f172a;
            margin-bottom: 15px;
            font-size: 2.2rem;
            letter-spacing: -1px;
        }

        input {
            background-color: #f8fafc;
            border: 2px solid #f1f5f9;
            padding: 14px 20px;
            margin: 10px 0;
            width: 120%;
            border-radius: 16px;
            color: #0f172a;
            outline: none;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        input:focus {
            border-color: #6366f1;
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        input::placeholder {
            color: #94a3b8;
        }

        button {
            border-radius: 16px;
            border: none;
            background: var(--primary-gradient);
            color: white;
            font-size: 13px;
            font-weight: 800;
            padding: 15px 50px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 25px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
        }

        button:active {
            transform: scale(0.95);
        }

        button.ghost {
            background: transparent;
            border: 2px solid #FFFFFF;
            box-shadow: none;
            margin-top: 30px;
        }

        button.ghost:hover {
            background: white;
            color: #6366f1;
        }

        span {
            font-size: 13px;
            color: #64748b;
            font-weight: 500;
        }

        .role-selector {
            display: flex;
            gap: 15px;
            margin: 15px 0;
        }

        .role-option {
            padding: 8px 20px;
            border-radius: 12px;
            border: 2px solid #f1f5f9;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: 0.3s;
            color: #64748b;
        }

        .role-option.active {
            background: #eef2ff;
            color: #6366f1;
            border-color: #6366f1;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <!-- Sign Up Form -->
        <div class="form-container signup-container">
            <form action="#">
                <h1>Create Account</h1>
                <span>or use your email for registration</span>
                <input type="text" placeholder="Name" />
                <input type="email" placeholder="Email" />
                <input type="password" placeholder="Password" />
                <div class="role-selector">
                    <div class="role-option active" onclick="setRole(this, 'user')">Citizen</div>
                    <div class="role-option" onclick="setRole(this, 'authority')">Authority</div>
                </div>
                <button type="button" onclick="handleAuth('signup')">Sign Up</button>
            </form>
        </div>

        <!-- Login Form -->
        <div class="form-container login-container">
            <form action="#">
                <h1>Sign in</h1>
                <span>or use your account</span>
                <input type="email" id="login-email" placeholder="Email" />
                <input type="password" id="login-password" placeholder="Password" />
                <a href="#" style="color: var(--text-secondary); font-size: 12px; text-decoration: none; margin: 10px 0;">Forgot your password?</a>
                <button type="button" onclick="handleAuth('login')">Sign In</button>
            </form>
        </div>

        <!-- Overlay -->
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Welcome Back!</h1>
                    <p>To keep connected with us please login with your personal info</p>
                    <button class="ghost" id="signIn">Sign In</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Hello, Friend!</h1>
                    <p>Enter your personal details and start journey with us</p>
                    <button class="ghost" id="signUp">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const signUpButton = document.getElementById('signUp');
        const signInButton = document.getElementById('signIn');
        const container = document.getElementById('container');
        let selectedRole = 'user';

        signUpButton.addEventListener('click', () => {
            container.classList.add("active");
        });

        signInButton.addEventListener('click', () => {
            container.classList.remove("active");
        });

        function setRole(el, role) {
            document.querySelectorAll('.role-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
            selectedRole = role;
        }

        async function handleAuth(type) {
            const container = document.getElementById('container');
            const isSignup = container.classList.contains('active');
            
            let email, password, name, role;
            
            if (isSignup) {
                const signupForm = document.querySelector('.signup-container form');
                name = signupForm.querySelector('input[type="text"]').value;
                email = signupForm.querySelector('input[type="email"]').value;
                password = signupForm.querySelector('input[type="password"]').value;
                role = selectedRole;
            } else {
                email = document.getElementById('login-email').value;
                password = document.getElementById('login-password').value;
            }

            if (!email || !password) return alert('Please fill in all fields');

            try {
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email, 
                        password, 
                        name, 
                        role, 
                        action: isSignup ? 'signup' : 'login' 
                    })
                });

                const data = await response.json();
                if (data.success) {
                    if (data.role === 'authority') {
                        window.location.href = '/authority';
                    } else {
                        window.location.href = '/dashboard';
                    }
                } else {
                    alert(data.message || 'Authentication failed');
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred during authentication');
            }
        }
    </script>
</body>
</html>
